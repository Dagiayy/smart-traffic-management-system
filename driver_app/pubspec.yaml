name: citizen_app
description: Citizen Traffic Compliance App — Government-grade smart traffic management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^14.0.2

  # Secure storage / persistence
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.68.0
  pinput: ^5.0.0

  # Forms
  flutter_form_builder: ^9.3.0
  form_builder_validators: ^11.0.0

  # Files / Images
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  path_provider: ^2.1.3

  # Notifications (placeholder for FCM)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1

  # Connectivity / offline
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.0

  # Maps (for traffic alerts)
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Misc
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
