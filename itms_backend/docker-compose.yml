version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: itms_db
      POSTGRES_USER: itms_user
      POSTGRES_PASSWORD: itms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 itms_backend.asgi:application
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A itms_backend worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis
      - backend

  celery-beat:
    build: .
    command: celery -A itms_backend beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - db
      - redis
      - celery

volumes:
  postgres_data:
  minio_data:
  media_files:
