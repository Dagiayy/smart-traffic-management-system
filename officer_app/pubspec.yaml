name: officer_app
description: Traffic Police Field Enforcement System — Government-grade mobile enforcement platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^14.0.2

  # Secure storage / persistence
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  equatable: ^2.0.5
  dartz: ^0.10.1

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0

  # Media / Evidence capture
  image_picker: ^1.1.2
  camera: ^0.11.0+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Location / Maps
  geolocator: ^12.0.0
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # QR / Barcode
  mobile_scanner: ^5.1.1

  # Misc
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  pinput: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
